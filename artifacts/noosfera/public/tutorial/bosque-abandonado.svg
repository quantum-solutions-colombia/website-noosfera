<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a0a"/>
      <stop offset="50%" stop-color="#152210"/>
      <stop offset="100%" stop-color="#1c2d14"/>
    </linearGradient>
    <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d8b0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8d8b0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2d10"/>
      <stop offset="100%" stop-color="#0d1a08"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark sky visible through canopy -->
  <rect width="800" height="300" fill="url(#sky)"/>

  <!-- Moonlight patch -->
  <ellipse cx="400" cy="80" rx="180" ry="120" fill="#c8d8b0" opacity="0.05" filter="url(#blur1)"/>
  <ellipse cx="400" cy="100" rx="100" ry="80" fill="#c8d8b0" opacity="0.08" filter="url(#blur1)"/>

  <!-- Very far background trees (barely visible) -->
  <rect x="0" y="120" width="800" height="180" fill="#0e1a09" opacity="0.8"/>
  <!-- Far treeline silhouette -->
  <path d="M 0 135 Q 25 115 50 130 Q 75 118 100 132 Q 125 120 150 135 Q 175 122 200 135 Q 225 120 250 133 Q 275 118 300 135 Q 325 120 350 132 Q 375 115 400 132 Q 425 118 450 135 Q 475 122 500 135 Q 525 118 550 130 Q 575 120 600 133 Q 625 118 650 130 Q 675 120 700 132 Q 725 115 750 130 Q 775 120 800 132 L 800 300 L 0 300 Z" fill="#0d1808" opacity="0.9" filter="url(#blur2)"/>

  <!-- Mid-ground trees -->
  <!-- Tree trunks (gnarled, tall) -->
  <!-- Left cluster -->
  <rect x="38" y="80" width="14" height="220" fill="#1a1208" rx="2"/>
  <path d="M 45 80 Q 38 60 42 30 Q 46 10 45 0" stroke="#1a1208" stroke-width="12" fill="none"/>
  <path d="M 45 100 Q 28 85 18 70" stroke="#1a1208" stroke-width="7" fill="none"/>
  <path d="M 45 130 Q 65 115 75 100" stroke="#1a1208" stroke-width="6" fill="none"/>

  <rect x="105" y="60" width="18" height="240" fill="#1c1409" rx="3"/>
  <path d="M 114 60 Q 108 35 112 5" stroke="#1c1409" stroke-width="14" fill="none"/>
  <path d="M 114 90 Q 90 72 78 55" stroke="#1c1409" stroke-width="8" fill="none"/>
  <path d="M 114 120 Q 138 105 148 90" stroke="#1c1409" stroke-width="7" fill="none"/>
  <path d="M 114 150 Q 95 140 82 130" stroke="#1c1409" stroke-width="5" fill="none"/>

  <!-- Right cluster -->
  <rect x="660" y="55" width="20" height="245" fill="#1a1208" rx="3"/>
  <path d="M 670 55 Q 664 30 668 0" stroke="#1a1208" stroke-width="16" fill="none"/>
  <path d="M 670 85 Q 645 68 632 50" stroke="#1a1208" stroke-width="9" fill="none"/>
  <path d="M 670 115 Q 695 98 708 82" stroke="#1a1208" stroke-width="8" fill="none"/>
  <path d="M 670 145 Q 650 135 638 122" stroke="#1a1208" stroke-width="6" fill="none"/>

  <rect x="730" y="70" width="16" height="230" fill="#1c1409" rx="2"/>
  <path d="M 738 70 Q 732 45 736 15" stroke="#1c1409" stroke-width="12" fill="none"/>
  <path d="M 738 100 Q 715 82 703 65" stroke="#1c1409" stroke-width="7" fill="none"/>
  <path d="M 738 130 Q 758 115 768 100" stroke="#1c1409" stroke-width="6" fill="none"/>

  <!-- Foreground main trees (darkest, closest) -->
  <!-- Left foreground -->
  <rect x="-5" y="30" width="24" height="270" fill="#110e05" rx="3"/>
  <path d="M 7 30 Q 0 5 4 -10" stroke="#110e05" stroke-width="18" fill="none"/>
  <path d="M 7 60 Q -20 40 -35 20" stroke="#110e05" stroke-width="11" fill="none"/>
  <path d="M 7 95 Q 35 75 48 58" stroke="#110e05" stroke-width="9" fill="none"/>
  <path d="M 7 135 Q -15 120 -28 108" stroke="#110e05" stroke-width="7" fill="none"/>
  <path d="M 7 175 Q 25 165 35 152" stroke="#110e05" stroke-width="6" fill="none"/>

  <rect x="170" y="20" width="22" height="280" fill="#130f06" rx="3"/>
  <path d="M 181 20 Q 175 -5 179 -20" stroke="#130f06" stroke-width="16" fill="none"/>
  <path d="M 181 55 Q 155 35 140 18" stroke="#130f06" stroke-width="10" fill="none"/>
  <path d="M 181 90 Q 208 72 222 55" stroke="#130f06" stroke-width="9" fill="none"/>
  <path d="M 181 125 Q 162 110 148 98" stroke="#130f06" stroke-width="7" fill="none"/>
  <path d="M 181 160 Q 200 150 210 138" stroke="#130f06" stroke-width="6" fill="none"/>

  <!-- Right foreground -->
  <rect x="605" y="15" width="25" height="285" fill="#110e05" rx="3"/>
  <path d="M 617 15 Q 610 -10 615 -25" stroke="#110e05" stroke-width="19" fill="none"/>
  <path d="M 617 50 Q 588 30 572 12" stroke="#110e05" stroke-width="11" fill="none"/>
  <path d="M 617 88 Q 645 68 660 50" stroke="#110e05" stroke-width="10" fill="none"/>
  <path d="M 617 125 Q 596 110 580 98" stroke="#110e05" stroke-width="8" fill="none"/>
  <path d="M 617 162 Q 635 150 648 138" stroke="#110e05" stroke-width="6" fill="none"/>

  <rect x="785" y="25" width="20" height="275" fill="#130f06" rx="3"/>
  <path d="M 795 25 Q 790 0 793 -15" stroke="#130f06" stroke-width="15" fill="none"/>
  <path d="M 795 60 Q 770 42 758 25" stroke="#130f06" stroke-width="9" fill="none"/>
  <path d="M 795 95 Q 818 78 828 62" stroke="#130f06" stroke-width="8" fill="none"/>

  <!-- Foliage/canopy masses -->
  <ellipse cx="45" cy="60" rx="55" ry="45" fill="#0f1c09" opacity="0.95"/>
  <ellipse cx="25" cy="45" rx="38" ry="30" fill="#0d1807" opacity="0.9"/>
  <ellipse cx="114" cy="35" rx="65" ry="50" fill="#101e0a" opacity="0.95"/>
  <ellipse cx="85" cy="25" rx="45" ry="35" fill="#0e1c09" opacity="0.9"/>

  <ellipse cx="670" cy="30" rx="70" ry="55" fill="#0f1c09" opacity="0.95"/>
  <ellipse cx="700" cy="20" rx="50" ry="38" fill="#0d1807" opacity="0.9"/>
  <ellipse cx="738" cy="45" rx="60" ry="48" fill="#101e0a" opacity="0.95"/>
  <ellipse cx="770" cy="32" rx="42" ry="32" fill="#0e1c09" opacity="0.9"/>

  <!-- Ground floor details -->
  <rect x="0" y="240" width="800" height="60" fill="url(#ground)"/>
  <!-- Roots -->
  <path d="M 7 300 Q 20 270 10 250" stroke="#1a1208" stroke-width="8" fill="none" opacity="0.8"/>
  <path d="M 7 300 Q -10 275 5 255" stroke="#1a1208" stroke-width="6" fill="none" opacity="0.7"/>
  <path d="M 181 300 Q 195 275 185 255" stroke="#130f06" stroke-width="8" fill="none" opacity="0.8"/>
  <path d="M 181 300 Q 165 272 178 252" stroke="#130f06" stroke-width="6" fill="none" opacity="0.7"/>
  <path d="M 617 300 Q 630 275 620 255" stroke="#110e05" stroke-width="8" fill="none" opacity="0.8"/>
  <path d="M 617 300 Q 600 272 614 252" stroke="#110e05" stroke-width="6" fill="none" opacity="0.7"/>

  <!-- Ground foliage/ferns -->
  <path d="M 80 280 Q 95 260 110 275 Q 125 255 140 272" fill="none" stroke="#1a3010" stroke-width="3" opacity="0.6"/>
  <path d="M 90 290 Q 100 268 112 282" fill="none" stroke="#1a3010" stroke-width="2.5" opacity="0.55"/>
  <path d="M 500 278 Q 515 258 530 273 Q 545 255 558 272" fill="none" stroke="#1a3010" stroke-width="3" opacity="0.6"/>
  <path d="M 350 285 Q 360 265 370 278 Q 380 260 392 275" fill="none" stroke="#1a3010" stroke-width="2.5" opacity="0.5"/>

  <!-- Fallen log -->
  <path d="M 230 265 Q 320 258 410 268 Q 430 272 415 276 Q 325 268 238 275 Z" fill="#1a1208" opacity="0.7"/>

  <!-- Moss patches on ground -->
  <ellipse cx="300" cy="270" rx="40" ry="8" fill="#1d3515" opacity="0.5"/>
  <ellipse cx="550" cy="275" rx="30" ry="6" fill="#1d3515" opacity="0.45"/>

  <!-- Bioluminescent mushrooms / glowing plants -->
  <circle cx="260" cy="262" r="3" fill="#a0ff80" opacity="0.35" filter="url(#glow)"/>
  <circle cx="280" cy="268" r="2" fill="#a0ff80" opacity="0.28" filter="url(#glow)"/>
  <circle cx="540" cy="264" r="3" fill="#a0ff80" opacity="0.32" filter="url(#glow)"/>
  <circle cx="558" cy="270" r="2" fill="#a0ff80" opacity="0.25" filter="url(#glow)"/>
  <circle cx="400" cy="255" r="4" fill="#80ffaa" opacity="0.2" filter="url(#glow)"/>

  <!-- Firefly lights -->
  <circle cx="320" cy="145" r="2.5" fill="#ffff88" opacity="0.4" filter="url(#glow)"/>
  <circle cx="480" cy="130" r="2" fill="#ffff88" opacity="0.35" filter="url(#glow)"/>
  <circle cx="560" cy="160" r="2.5" fill="#ffff88" opacity="0.38" filter="url(#glow)"/>
  <circle cx="240" cy="175" r="2" fill="#ffff88" opacity="0.3" filter="url(#glow)"/>
  <circle cx="380" cy="108" r="2" fill="#ffff88" opacity="0.32" filter="url(#glow)"/>

  <!-- Light rays through canopy -->
  <path d="M 350 30 L 320 240" stroke="#c8d8b0" stroke-width="25" opacity="0.04" filter="url(#blur1)"/>
  <path d="M 420 25 L 445 240" stroke="#c8d8b0" stroke-width="18" opacity="0.04" filter="url(#blur1)"/>
  <path d="M 390 20 L 390 200" stroke="#c8d8b0" stroke-width="30" opacity="0.03" filter="url(#blur1)"/>

  <!-- Ground fog -->
  <rect x="0" y="245" width="800" height="30" fill="url(#fog)" filter="url(#blur1)"/>
  <ellipse cx="400" cy="258" rx="500" ry="15" fill="#c8d8b0" opacity="0.07" filter="url(#blur1)"/>

  <!-- Cobweb detail -->
  <path d="M 150 120 L 200 140 L 165 160 Z" fill="none" stroke="#c8d8b0" stroke-width="0.5" opacity="0.3"/>
  <path d="M 175 120 L 175 160" stroke="#c8d8b0" stroke-width="0.5" opacity="0.25"/>
  <path d="M 150 140 L 200 140" stroke="#c8d8b0" stroke-width="0.5" opacity="0.25"/>
</svg>
