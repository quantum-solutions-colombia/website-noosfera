<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#0d2b4e"/>
      <stop offset="100%" stop-color="#0e4d6e"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4d6e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#021020"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background sky -->
  <rect width="800" height="300" fill="url(#sky)"/>

  <!-- Distant haze -->
  <ellipse cx="400" cy="180" rx="500" ry="80" fill="#0e4d6e" opacity="0.3" filter="url(#blur1)"/>

  <!-- Background buildings (submerged, blurry) -->
  <rect x="50" y="120" width="60" height="180" fill="#0a2540" opacity="0.6" filter="url(#blur1)"/>
  <rect x="65" y="90" width="30" height="40" fill="#0a2540" opacity="0.5" filter="url(#blur1)"/>
  <rect x="140" y="100" width="80" height="200" fill="#0b2d4e" opacity="0.65" filter="url(#blur1)"/>
  <rect x="155" y="70" width="50" height="40" fill="#0b2d4e" opacity="0.6" filter="url(#blur1)"/>
  <rect x="600" y="110" width="70" height="190" fill="#0a2540" opacity="0.6" filter="url(#blur1)"/>
  <rect x="690" y="90" width="90" height="210" fill="#0b2d4e" opacity="0.65" filter="url(#blur1)"/>

  <!-- Foreground buildings (clearer) -->
  <rect x="240" y="80" width="55" height="220" fill="#0c3060" opacity="0.85"/>
  <rect x="250" y="55" width="35" height="35" fill="#0c3060" opacity="0.8"/>
  <!-- Windows with cyan glow -->
  <rect x="248" y="90" width="8" height="10" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <rect x="262" y="90" width="8" height="10" fill="#00d4ff" opacity="0.4"/>
  <rect x="276" y="90" width="8" height="10" fill="#00d4ff" opacity="0.6"/>
  <rect x="248" y="110" width="8" height="10" fill="#00d4ff" opacity="0.3"/>
  <rect x="262" y="110" width="8" height="10" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <rect x="248" y="130" width="8" height="10" fill="#00d4ff" opacity="0.5"/>
  <rect x="276" y="130" width="8" height="10" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <rect x="262" y="150" width="8" height="10" fill="#00d4ff" opacity="0.4"/>
  <rect x="248" y="170" width="8" height="10" fill="#00d4ff" opacity="0.6"/>

  <rect x="320" y="50" width="80" height="250" fill="#0d3570" opacity="0.9"/>
  <rect x="335" y="30" width="50" height="28" fill="#0d3570" opacity="0.85"/>
  <!-- Large building windows -->
  <rect x="330" y="65" width="12" height="14" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <rect x="350" y="65" width="12" height="14" fill="#00d4ff" opacity="0.5"/>
  <rect x="370" y="65" width="12" height="14" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <rect x="330" y="90" width="12" height="14" fill="#00d4ff" opacity="0.3"/>
  <rect x="350" y="90" width="12" height="14" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <rect x="370" y="90" width="12" height="14" fill="#00d4ff" opacity="0.5"/>
  <rect x="330" y="115" width="12" height="14" fill="#00d4ff" opacity="0.7"/>
  <rect x="350" y="115" width="12" height="14" fill="#00d4ff" opacity="0.4"/>
  <rect x="370" y="115" width="12" height="14" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <rect x="330" y="140" width="12" height="14" fill="#00d4ff" opacity="0.6"/>
  <rect x="370" y="140" width="12" height="14" fill="#00d4ff" opacity="0.5"/>
  <rect x="350" y="165" width="12" height="14" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>

  <rect x="430" y="95" width="65" height="205" fill="#0c3060" opacity="0.88"/>
  <rect x="445" y="110" width="9" height="12" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>
  <rect x="462" y="110" width="9" height="12" fill="#00d4ff" opacity="0.4"/>
  <rect x="479" y="110" width="9" height="12" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <rect x="445" y="132" width="9" height="12" fill="#00d4ff" opacity="0.5"/>
  <rect x="462" y="132" width="9" height="12" fill="#00d4ff" opacity="0.7"/>
  <rect x="445" y="155" width="9" height="12" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <rect x="479" y="155" width="9" height="12" fill="#00d4ff" opacity="0.4"/>
  <rect x="462" y="178" width="9" height="12" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>

  <rect x="520" y="70" width="55" height="230" fill="#0d3570" opacity="0.85"/>
  <rect x="532" y="85" width="8" height="10" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <rect x="548" y="85" width="8" height="10" fill="#00d4ff" opacity="0.4"/>
  <rect x="532" y="105" width="8" height="10" fill="#00d4ff" opacity="0.6"/>
  <rect x="548" y="105" width="8" height="10" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <rect x="532" y="125" width="8" height="10" fill="#00d4ff" opacity="0.5"/>
  <rect x="548" y="145" width="8" height="10" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>

  <!-- Water surface with reflections -->
  <rect x="0" y="210" width="800" height="90" fill="url(#water)" opacity="0.85"/>

  <!-- Water ripples/waves -->
  <path d="M 0 215 Q 100 210 200 218 Q 300 225 400 212 Q 500 200 600 215 Q 700 228 800 218" fill="none" stroke="#1a7aaa" stroke-width="1.5" opacity="0.5"/>
  <path d="M 0 225 Q 80 220 160 228 Q 280 238 400 222 Q 520 208 640 225 Q 720 235 800 228" fill="none" stroke="#1a7aaa" stroke-width="1" opacity="0.4"/>
  <path d="M 0 238 Q 120 233 240 241 Q 360 248 480 235 Q 600 222 720 238 Q 760 242 800 238" fill="none" stroke="#1a7aaa" stroke-width="1.5" opacity="0.35"/>

  <!-- Reflections in water -->
  <rect x="325" y="215" width="85" height="85" fill="#0d3570" opacity="0.25" filter="url(#blur2)"/>
  <line x1="355" y1="220" x2="352" y2="295" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="372" y1="220" x2="374" y2="295" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <line x1="388" y1="220" x2="391" y2="295" stroke="#00d4ff" stroke-width="1.5" opacity="0.25"/>
  <line x1="248" y1="220" x2="245" y2="290" stroke="#00d4ff" stroke-width="1.5" opacity="0.2"/>
  <line x1="470" y1="220" x2="473" y2="290" stroke="#00d4ff" stroke-width="1.5" opacity="0.2"/>

  <!-- Light rays from buildings underwater -->
  <path d="M 358 200 L 340 300" stroke="#00d4ff" stroke-width="8" opacity="0.06" filter="url(#blur1)"/>
  <path d="M 375 200 L 380 300" stroke="#00d4ff" stroke-width="6" opacity="0.05" filter="url(#blur1)"/>

  <!-- Bubbles -->
  <circle cx="200" cy="190" r="3" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <circle cx="450" cy="175" r="2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.35"/>
  <circle cx="560" cy="185" r="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <circle cx="310" cy="165" r="2.5" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.45"/>

  <!-- Ambient cyan glow from city lights -->
  <ellipse cx="360" cy="200" rx="200" ry="40" fill="#00d4ff" opacity="0.04" filter="url(#blur1)"/>

  <!-- Seaweed/kelp silhouettes -->
  <path d="M 180 300 Q 175 270 183 240 Q 188 220 180 200" fill="none" stroke="#0d4e2a" stroke-width="4" opacity="0.6"/>
  <path d="M 620 300 Q 626 265 618 235 Q 612 215 622 195" fill="none" stroke="#0d4e2a" stroke-width="4" opacity="0.6"/>
  <path d="M 750 300 Q 754 275 748 255 Q 744 240 750 225" fill="none" stroke="#0d4e2a" stroke-width="3" opacity="0.5"/>

  <!-- Debris floating -->
  <rect x="100" y="220" width="25" height="4" rx="2" fill="#0c2840" opacity="0.7" transform="rotate(-8 100 220)"/>
  <rect x="650" y="230" width="18" height="3" rx="1" fill="#0c2840" opacity="0.6" transform="rotate(12 650 230)"/>
</svg>
